name: Build APK Direct

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project safely
        run: |
          flutter --version
          flutter create --platforms=android --org com.explapp --no-pub .
          rm -rf test

      - name: Get packages
        run: flutter pub get

      - name: Fix Android package and SDK
        run: |
          sed -i "s/applicationId = .*/applicationId = \"com.explapp.jamiyati\"/" android/app/build.gradle.kts
          sed -i "s/minSdk = flutter.minSdkVersion/minSdk = 23/" android/app/build.gradle.kts
          cat > android/app/src/main/AndroidManifest.xml <<'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="https" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="whatsapp" />
                  </intent>
              </queries>
              <application
                  android:label="جمعيتي"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          MANIFEST

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release

      - name: Copy APK direct
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/jamiyati.apk
          echo "# تحميل APK" > DOWNLOAD_APK.md
          echo "" >> DOWNLOAD_APK.md
          echo "تم بناء آخر نسخة هنا:" >> DOWNLOAD_APK.md
          echo "" >> DOWNLOAD_APK.md
          echo "apk/jamiyati.apk" >> DOWNLOAD_APK.md

      - name: Commit APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build direct APK
          file_pattern: apk/jamiyati.apk DOWNLOAD_APK.md
